<!DOCTYPE html>
<html>
<head>
    <title>Online Courses</title>
    <link rel="stylesheet" href="styles.css">
   <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: yellow;
        }

        /* Banner Styling */
        .banner {
            position: relative;
            width: 100%;
            height: 350px;
            background: url("images/banner.jpg") no-repeat center;
            background-size: cover;
        }

        .banner::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            top: 0;
            left: 0;
        }

        .banner-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 1;
            text-align: center;
        }

        .banner-text h1 {
            font-size: 40px;
            margin: 0;
        }

        .banner-text p {
            font-size: 18px;
        }

        /* Section Styling */
        section {
            padding: 20px;
            text-align: center;
        }

        /* Optional Hover Effect */
        .banner:hover {
            transform: scale(1.02);
            transition: 0.5s;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to Online Learning</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="login.html">Login</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="banner">
    <img src="ignite.png" alt="Banner">
</section>

<section>
    <h2>Learn Anytime, Anywhere</h2>
    <p>Explore our courses and upgrade your skills.</p>
</section>

</body>
</html>
